# ====================================================================
# Configuración por defecto - TODA opcional. Sobrescribir vía env vars.
# ====================================================================

# --- Servidor ---
server.port=${SERVER_PORT:8080}
prefix_server_path=${PREFIX_SERVER_PATH:/pdf/cfdi/4.0}
logging.level.com.zaxxer.hikari=OFF
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=OFF

# --- API externas (vacíos => fallbacks defensivos) ---
api.catalogos.url=${API_CATALOGOS_URL:}
url.servicio.logos=${API_GET_LOGO:}
clave.producto=${CLAVE_PRODUCTO:DEFAULT}

# --- Base de datos (vacío => arranca sin DB; HikariCP en modo lazy) ---
# La URL por defecto es un sentinel inalcanzable para que la app pueda arrancar
# aunque no haya DB; con initialization-fail-timeout=-1 Hikari inicializa de
# forma perezosa y no aborta el contexto de Spring.
spring.datasource.url=${DB_URL:jdbc:mariadb://127.0.0.1:1/none}
spring.datasource.username=${DB_USER:none}
spring.datasource.password=${DB_PASSWORD:none}
spring.datasource.driver-class-name=${DB_DRIVER:org.mariadb.jdbc.Driver}
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=2000
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:2}
spring.datasource.hikari.minimum-idle=0
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# --- Jackson ---
spring.jackson.time-zone=UTC

# --- Multipart (XML upload pequeño) ---
spring.servlet.multipart.max-request-size=2MB
spring.servlet.multipart.max-file-size=2MB

# --- Elastic APM (opcional, OFF por defecto) ---
elastic.apm.enabled=${ELS_APM_ENABLED:false}
elastic.apm.server-url=${ELS_APM_SERVER_URL:}
elastic.apm.service-name=${ELS_APM_SERVICE_NAME:cfdi-pdf}
elastic.apm.secret-token=${ELS_APM_SECRET_TOKEN:}
elastic.apm.environment=${ELS_APM_ENVIRONMENT:production}
elastic.apm.application-packages=${ELS_APM_PACKAGE:com.cfdi40.pdfgen}
elastic.apm.log-level=${ELS_APM_LOG_LEVEL:INFO}

# --- AGPL §13 - URL pública del código fuente ---
# El placeholder @project.version@ es sustituido por Maven (resource filtering
# con delimitadores @...@ por defecto del spring-boot-starter-parent) en
# build-time con el valor de <version> del pom.xml. Garantiza que la URL
# que devuelve GET /source apunte al TAG exacto del JAR desplegado, cumpliendo
# con el requisito de "Corresponding Source" del Art. 13 de la AGPL v3.
app.source.url=${APP_SOURCE_URL:https://github.com/Next-Technologies-Group/com-next-tech-emision-hoteles-generacion-pdf/tree/v@project.version@}

# --- XML SAT ---
sat.xml.strict-validation=${SAT_XML_STRICT:false}
